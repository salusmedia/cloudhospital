[project]
name = "py-common"
version = "0.1.0"
description = "AI 云医院后端共享库：鉴权、审计、脱敏、日志、DB 基类"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115",
  "sqlalchemy>=2.0",
  "pydantic>=2.8",
]

[dependency-groups]
dev = ["pytest>=8.3", "mypy>=1.11", "ruff>=0.6"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["py_common"]
