# 院内生产编排。镜像由离线包 docker load 导入；配置全部来自外部 .env（不进镜像）。
# 新增场景：复制一个 scenario-XXX 后端块，并在 gateway 路由中注册。
services:
  postgres:
    image: postgres:16
    env_file: [./config/.env]
    volumes: ["./data/pg:/var/lib/postgresql/data"]
    restart: always

  redis:
    image: redis:7
    restart: always

  minio:
    image: minio/minio
    command: server /data
    env_file: [./config/.env]
    volumes: ["./data/minio:/data"]
    restart: always

  gateway:
    image: ${REGISTRY}/gateway:${TAG}
    env_file: [./config/.env]
    depends_on: [postgres, redis]
    restart: always

  platform-auth:
    image: ${REGISTRY}/platform-auth:${TAG}
    env_file: [./config/.env]
    restart: always

  platform-patient:
    image: ${REGISTRY}/platform-patient:${TAG}
    env_file: [./config/.env]
    restart: always

  # ---- 场景服务（每新增一个场景，复制一段） ----
  scenario-001-backend:
    image: ${REGISTRY}/scenario-001-backend:${TAG}
    env_file: [./config/.env]
    depends_on: [postgres, gateway]
    restart: always

  # 前端统一构建进一个静态/standalone 镜像，由 nginx/gateway 提供
  web:
    image: ${REGISTRY}/web:${TAG}
    env_file: [./config/.env]
    restart: always

  nginx:
    image: nginx:1.27
    volumes: ["./config/nginx:/etc/nginx/conf.d:ro"]
    ports: ["443:443", "80:80"]
    depends_on: [gateway, web]
    restart: always
