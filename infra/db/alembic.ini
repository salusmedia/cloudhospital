# Alembic config for AI Cloud Hospital platform DB migrations.
# Keep this file ASCII-only: on Windows, configparser reads it with the system
# locale encoding (GBK on zh-CN), so non-ASCII comments break `alembic` commands.
# Human-readable notes live in infra/db/README.md instead.
#
# The real DB URL is injected at runtime via env var DATABASE_URL (private deploy:
# never hard-code secrets in the repo / image). See migrations/env.py.
# Local dev example:
#   DATABASE_URL=postgresql+psycopg://dev:dev@localhost:5432/hospital

[alembic]
script_location = migrations
prepend_sys_path = .
# Left empty on purpose: env.py prefers env var DATABASE_URL.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
